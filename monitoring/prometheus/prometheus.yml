global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: node
    static_configs:
      - targets:
{% for host in groups['all'] | sort %}
          - "{{ hostvars[host]['private_ip'] }}:9100"
{% endfor %}
        labels:
          fleet: onboarding_platform

  - job_name: api
    metrics_path: /metrics
    static_configs:
      - targets:
          - "{{ hostvars[groups['app'][0]]['private_ip'] }}:3000"
        labels:
          fleet: onboarding_platform
