# Frontend CI (CLAUDE.md §8).
#
# What this does:
#   - On every pull request and every push to main that touches client/
#     (or this file), install dependencies, lint, typecheck, run the
#     Vitest suite, and build. A green run is the signal that the Vercel
#     deployment will succeed.
#   - On push to main, deploy to Vercel after a successful build.
#   - Path filter keeps this workflow silent for backend-only, infra,
#     docs, and monitoring changes. The separate server.yml and
#     infra.yml workflows own those paths.

name: client

on:
  pull_request:
    paths:
      - "client/**"
      - ".github/workflows/client.yml"
  push:
    branches: [main]
    paths:
      - "client/**"
      - ".github/workflows/client.yml"

# Cancel in-flight runs when a new commit lands on the same PR/branch.
# Saves CI minutes on rapid-fire pushes without affecting main-branch
# runs (which share concurrency by ref, not across refs).
concurrency:
  group: client-${{ github.ref }}
  cancel-in-progress: true

# Default to least-privilege. This workflow only reads the repo; it
# never comments on PRs, never pushes, and never touches packages.
permissions:
  contents: read

jobs:
  build:
    name: lint + typecheck + test + build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: client

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js (lts/*)
        uses: actions/setup-node@v6
        with:
          node-version: "lts/*"
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Deploy to Vercel
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          npx vercel pull --yes --token="${{ secrets.VERCEL_TOKEN }}"
          npx vercel build --prod --token="${{ secrets.VERCEL_TOKEN }}"
          npx vercel deploy --prebuilt --prod --token="${{ secrets.VERCEL_TOKEN }}"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
