---
# Master playbook — dependency order:
#   common (all) → db + worker (parallel in separate plays) → app → prometheus → grafana
#
# Connection: SSM (amazon.aws.aws_ssm). No SSH. Controller needs:
#   - AWS creds (profile or env) with ssm:StartSession on the fleet
#   - S3 transfer bucket configured as ansible_aws_ssm_bucket_name in inventory
#   - remote tmp under /tmp because the session starts as ssm-user, not ec2-user
#   - ansible-galaxy collection install -r requirements.yml
#
# Inventory: run scripts/render-inventory.sh from the repo root after
# terraform apply. The playbook loads ../group_vars/all/main.yml and
# ../group_vars/all/vault.yml explicitly because the repo keeps playbooks/,
# inventory/, and group_vars/ as sibling directories.

- name: Common baseline on all EC2s
  hosts: all
  become: true
  gather_facts: true
  vars_files: &all_group_vars
    - ../group_vars/all/main.yml
    - ../group_vars/all/vault.yml
  roles:
    - common

- name: PostgreSQL on db
  hosts: db
  become: true
  vars_files: *all_group_vars
  roles:
    - db

- name: Redis + BullMQ worker on worker
  hosts: worker
  become: true
  vars_files: *all_group_vars
  roles:
    - worker

- name: API on app
  hosts: app
  become: true
  vars_files: *all_group_vars
  pre_tasks:
    - name: Wait for PostgreSQL
      ansible.builtin.wait_for:
        host: "{{ hostvars[groups['db'][0]]['private_ip'] }}"
        port: 5432
        timeout: 300
      delegate_to: localhost

    - name: Wait for Redis
      ansible.builtin.wait_for:
        host: "{{ hostvars[groups['worker'][0]]['private_ip'] }}"
        port: 6379
        timeout: 300
      delegate_to: localhost

  roles:
    - app

- name: Prometheus
  hosts: prometheus
  become: true
  vars_files: *all_group_vars
  roles:
    - prometheus

- name: Grafana
  hosts: grafana
  become: true
  vars_files: *all_group_vars
  roles:
    - grafana
