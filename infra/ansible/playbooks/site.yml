---
# Master playbook — dependency order:
#   common (all) → db + worker (parallel in separate plays) → app → prometheus → grafana
#
# Connection: SSM (amazon.aws.aws_ssm). No SSH. Controller needs:
#   - AWS creds (profile or env) with ssm:StartSession on the fleet
#   - ansible-galaxy collection install -r requirements.yml
#
# Inventory: run ../scripts/render-inventory.sh after terraform apply, then
# optionally ansible-vault-encrypt group_vars/all/vault.yml

- name: Common baseline on all EC2s
  hosts: all
  become: true
  gather_facts: true
  roles:
    - common

- name: PostgreSQL on db
  hosts: db
  become: true
  roles:
    - db

- name: Redis + BullMQ worker on worker
  hosts: worker
  become: true
  roles:
    - worker

- name: API on app
  hosts: app
  become: true
  pre_tasks:
    - name: Wait for PostgreSQL
      ansible.builtin.wait_for:
        host: "{{ hostvars[groups['db'][0]]['private_ip'] }}"
        port: 5432
        timeout: 300
      delegate_to: localhost

    - name: Wait for Redis
      ansible.builtin.wait_for:
        host: "{{ hostvars[groups['worker'][0]]['private_ip'] }}"
        port: 6379
        timeout: 300
      delegate_to: localhost

  roles:
    - app

- name: Prometheus
  hosts: prometheus
  become: true
  roles:
    - prometheus

- name: Grafana
  hosts: grafana
  become: true
  roles:
    - grafana
