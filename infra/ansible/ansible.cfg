# Project-local Ansible configuration.
#
# Everything in this file exists to make Ansible runs reproducible
# between a developer laptop and GitHub Actions — no hidden
# dependencies on the operator's ~/.ansible.cfg or env vars beyond
# AWS_PROFILE / AWS_REGION and the vault password file.

[defaults]
# Paths are relative to this file when Ansible is invoked from
# infra/ansible/. CI invokes from the repo root, so keep these
# explicit-relative instead of assuming cwd.
inventory         = ./inventory/aws_ec2.yml
roles_path        = ./roles
collections_path  = ./collections
vault_password_file = ./.vault-pass

# Retry files are clutter in a CI-first workflow — a failed run should
# be re-run in full, not patched with a .retry file that nobody will
# remember to delete.
retry_files_enabled = False

# SSM connection plugin does not speak SSH — host key checking would
# only apply to the eventual fallback. Disabled defensively.
host_key_checking = False

# YAML output is readable end-to-end; the default "minimal" callback
# hides multi-line diffs in template tasks.
stdout_callback   = yaml

# 5 hosts in the fleet; 5 forks keeps the whole run fully parallel
# without oversubscribing the SSM control plane.
forks             = 5

# Default user inside Amazon Linux 2023 AMIs. The SSM connection
# plugin respects this when invoking `sudo`.
remote_user       = ec2-user

# Silence cosmetic warnings that never indicate a real problem
# (python interpreter discovery notes, localhost implicit group).
interpreter_python = auto_silent

[inventory]
# Only the aws_ec2 plugin is allowed — no ini/yaml static inventory
# can slip in by accident and mask a Terraform output mismatch.
enable_plugins = amazon.aws.aws_ec2

[ssh_connection]
# Not used in practice (connection is aws_ssm) but left pipelined so
# an emergency SSH fallback would be fast.
pipelining = True
