---
# Non-secret defaults. Secrets live in vault.yml, which must be Ansible Vault
# encrypted before commit. Plaintext scratch copies stay gitignored.

onboarding_platform_db_name: onboarding
onboarding_platform_db_user: onboarding

# Frontend origin — set to the deployed Vercel URL before running Ansible.
# Used by PORTAL_BASE_URL (welcome email links) and CORS_ALLOWED_ORIGINS.
# Override at deploy time: ansible-playbook ... -e "onboarding_platform_frontend_origin=https://..."
onboarding_platform_frontend_origin: "https://CHANGE_ME.vercel.app"
onboarding_platform_portal_base_url: "{{ onboarding_platform_frontend_origin }}/portal"
onboarding_platform_cors_origins: "{{ onboarding_platform_frontend_origin }}"

# Node exporter — pinned version (amd64 AL2023 fleet)
node_exporter_version: "1.8.2"

# Prometheus — pinned binary version
prometheus_version: "2.53.1"

# Grafana — pinned OSS RPM version
grafana_version: "11.1.2"

# Release archives are downloaded on the Ansible controller, then copied to the
# private EC2 fleet over the existing SSM/S3 transport. The instances have no
# public internet route, so remote get_url tasks cannot fetch GitHub releases.
onboarding_platform_artifact_cache_dir: "{{ lookup('env', 'ONBOARDING_ARTIFACT_CACHE_DIR') | default('/tmp/onboarding-platform-ansible-cache', true) }}"
onboarding_platform_release_download_timeout: 120
onboarding_platform_release_download_retries: 5
onboarding_platform_release_download_delay: 15

# PostgreSQL tuning — ADR-004 / project rules §6 (1 GiB RAM)
postgres_shared_buffers: "128MB"
postgres_work_mem: "4MB"
postgres_max_connections: 20
postgres_effective_cache_size: "256MB"

# Private subnet CIDR for pg_hba — must match infra/terraform default private_subnet_cidr
postgres_vpc_private_cidr: "10.0.11.0/24"
