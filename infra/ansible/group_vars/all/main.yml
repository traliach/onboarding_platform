---
# Non-secret defaults. Secrets live in vault.yml (gitignored — copy from
# vault.example.yml and `ansible-vault encrypt`).

onboarding_platform_db_name: onboarding
onboarding_platform_db_user: onboarding

# Node exporter — pinned version (amd64 AL2023 fleet)
node_exporter_version: "1.8.2"

# Prometheus — pinned binary version
prometheus_version: "2.53.1"

# PostgreSQL tuning — ADR-004 / CLAUDE.md §6 (1 GiB RAM)
postgres_shared_buffers: "128MB"
postgres_work_mem: "4MB"
postgres_max_connections: 20
postgres_effective_cache_size: "256MB"

# Private subnet CIDR for pg_hba — must match infra/terraform default private_subnet_cidr
postgres_vpc_private_cidr: "10.0.11.0/24"
