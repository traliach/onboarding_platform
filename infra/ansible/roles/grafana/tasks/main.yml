---
- name: Remove Grafana RPM repository
  ansible.builtin.yum_repository:
    name: grafana
    state: absent

- name: Ensure controller artifact cache exists
  ansible.builtin.file:
    path: "{{ onboarding_platform_artifact_cache_dir }}"
    state: directory
    mode: "0755"
  delegate_to: localhost
  become: false
  run_once: true

- name: Check cached Grafana RPM
  ansible.builtin.stat:
    path: "{{ onboarding_platform_artifact_cache_dir }}/grafana-{{ grafana_version }}-1.x86_64.rpm"
  delegate_to: localhost
  become: false
  run_once: true
  register: grafana_rpm_cache

- name: Download Grafana RPM to controller
  ansible.builtin.get_url:
    url: "https://dl.grafana.com/oss/release/grafana-{{ grafana_version }}-1.x86_64.rpm"
    dest: "{{ onboarding_platform_artifact_cache_dir }}/grafana-{{ grafana_version }}-1.x86_64.rpm"
    mode: "0644"
    timeout: "{{ onboarding_platform_release_download_timeout }}"
  delegate_to: localhost
  become: false
  run_once: true
  register: grafana_rpm_download
  when: not grafana_rpm_cache.stat.exists
  until: grafana_rpm_download is succeeded
  retries: "{{ onboarding_platform_release_download_retries }}"
  delay: "{{ onboarding_platform_release_download_delay }}"

- name: Copy Grafana RPM to instance
  ansible.builtin.copy:
    src: "{{ onboarding_platform_artifact_cache_dir }}/grafana-{{ grafana_version }}-1.x86_64.rpm"
    dest: "/tmp/grafana-{{ grafana_version }}-1.x86_64.rpm"
    mode: "0644"

- name: Install Grafana
  ansible.builtin.dnf:
    name: "/tmp/grafana-{{ grafana_version }}-1.x86_64.rpm"
    state: present
    disable_gpg_check: true

- name: Grafana sysconfig (admin password + bind all interfaces)
  ansible.builtin.copy:
    dest: /etc/sysconfig/grafana-server
    mode: "0600"
    content: |
      GF_SECURITY_ADMIN_PASSWORD={{ onboarding_platform_grafana_admin_password }}
      GF_SERVER_HTTP_ADDR=0.0.0.0
  no_log: true
  notify: Restart grafana-server

- name: Provisioning directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: grafana
    group: grafana
    mode: "0755"
  loop:
    - /etc/grafana/provisioning/datasources
    - /etc/grafana/provisioning/dashboards
    - /var/lib/grafana/dashboards

- name: Prometheus datasource
  ansible.builtin.template:
    src: "{{ playbook_dir }}/../../../monitoring/grafana/datasources.yml"
    dest: /etc/grafana/provisioning/datasources/prometheus.yml
    owner: grafana
    group: grafana
    mode: "0644"
  notify: Restart grafana-server

- name: Dashboard provider
  ansible.builtin.copy:
    dest: /etc/grafana/provisioning/dashboards/default.yml
    owner: grafana
    group: grafana
    mode: "0644"
    content: |
      apiVersion: 1
      providers:
        - name: Default
          orgId: 1
          folder: ''
          type: file
          disableDeletion: false
          editable: true
          options:
            path: /var/lib/grafana/dashboards
  notify: Restart grafana-server

- name: Fleet overview dashboard
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../../../monitoring/grafana/dashboards/fleet-overview.json"
    dest: /var/lib/grafana/dashboards/fleet-overview.json
    owner: grafana
    group: grafana
    mode: "0644"
  notify: Restart grafana-server

- name: Onboarding jobs dashboard
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../../../monitoring/grafana/dashboards/onboarding-jobs.json"
    dest: /var/lib/grafana/dashboards/onboarding-jobs.json
    owner: grafana
    group: grafana
    mode: "0644"
  notify: Restart grafana-server

- name: Enable Grafana
  ansible.builtin.systemd:
    name: grafana-server
    enabled: true
    state: started
