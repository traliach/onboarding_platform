---
- name: Install Docker and AWS CLI (ECR login)
  ansible.builtin.dnf:
    name:
      - docker
      - awscli
    state: present

- name: Enable and start Docker
  ansible.builtin.systemd:
    name: docker
    enabled: true
    state: started

- name: Application config directory
  ansible.builtin.file:
    path: /etc/onboarding-platform
    state: directory
    mode: "0700"

- name: API environment file
  ansible.builtin.template:
    src: api.env.j2
    dest: /etc/onboarding-platform/api.env
    mode: "0600"
  no_log: true

- name: API systemd unit
  ansible.builtin.template:
    src: onboarding-api.service.j2
    dest: /etc/systemd/system/onboarding-api.service
    mode: "0644"
  notify:
    - Reload systemd
    - Restart onboarding-api

- name: Enable API service
  ansible.builtin.systemd:
    name: onboarding-api
    enabled: true
    state: started
