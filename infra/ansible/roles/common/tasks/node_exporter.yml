---
# node_exporter — the Prometheus agent that exposes CPU, memory,
# disk, and network metrics on :9100. Every EC2 runs it so the
# prometheus host can scrape the full fleet (ADR-003).
#
# Install strategy:
#   - Binary from GitHub releases, not a distro package. Distro
#     packages lag upstream by several minor versions and we want
#     Prometheus/node_exporter version compatibility explicit.
#   - Pinned version + SHA256 from defaults/main.yml. Changing the
#     version in one place without updating the checksum fails
#     loudly at get_url rather than quietly pulling whatever's on
#     GitHub.
#   - Dedicated system user, never root. node_exporter doesn't need
#     privileges — running as root is a pattern from old Prometheus
#     docs that persists by inertia.

- name: Create node_exporter system user
  ansible.builtin.user:
    name: "{{ common_node_exporter_user }}"
    system: true
    shell: /sbin/nologin
    home: /var/lib/node_exporter
    create_home: false
    state: present

- name: Check if node_exporter binary already at expected version
  ansible.builtin.command:
    cmd: "{{ common_node_exporter_bin }} --version"
  register: ne_current
  changed_when: false
  failed_when: false
  # Not failing when the binary is missing — this task only tells
  # us whether we need to download.

- name: Download node_exporter archive
  ansible.builtin.get_url:
    url: "{{ common_node_exporter_url }}"
    dest: "/tmp/{{ common_node_exporter_archive }}"
    checksum: "sha256:{{ common_node_exporter_sha256 }}"
    mode: "0644"
  when: node_exporter_version not in (ne_current.stdout | default(''))
  register: ne_download

- name: Unpack node_exporter to /usr/local/bin
  ansible.builtin.unarchive:
    src: "/tmp/{{ common_node_exporter_archive }}"
    dest: /usr/local/bin/
    remote_src: true
    extra_opts:
      - --strip-components=1
      - --wildcards
      - "*/node_exporter"
    owner: root
    group: root
    mode: "0755"
  when: ne_download is changed
  notify: Restart node_exporter

- name: Clean up downloaded archive
  ansible.builtin.file:
    path: "/tmp/{{ common_node_exporter_archive }}"
    state: absent
  when: ne_download is changed

- name: Install node_exporter systemd unit
  ansible.builtin.template:
    src: node_exporter.service.j2
    dest: /etc/systemd/system/node_exporter.service
    owner: root
    group: root
    mode: "0644"
  notify:
    - Reload systemd
    - Restart node_exporter

- name: Enable and start node_exporter
  ansible.builtin.systemd:
    name: node_exporter
    state: started
    enabled: true
    daemon_reload: true
