---
# Role-scoped defaults. Everything here can be overridden in
# group_vars/all/main.yml or per-host. If a value is likely to be
# tuned globally (version pins, ports), it lives in group_vars.
# If it is an internal detail nobody should touch, it lives here.

# Swap file sized to match the t2.micro instance's 1GB of RAM.
# Rationale: PostgreSQL on 1GB can briefly exceed RAM during a
# migration or a large COPY; swap turns an OOM kill into a slow
# query. Larger swap wastes EBS. ADR-004 documents the tuning
# philosophy.
common_swap_file_path: /swapfile
common_swap_file_size_mb: 1024

# node_exporter install location. /usr/local/bin is on PATH for the
# systemd unit's default environment, unlike /opt/prometheus/bin.
common_node_exporter_bin: /usr/local/bin/node_exporter
common_node_exporter_user: node_exporter

# Where to fetch the binary from. Pinned checksum lives alongside
# the download URL so a tampered release is caught at install time
# rather than manifesting as a subtle scrape bug.
common_node_exporter_archive: >-
  node_exporter-{{ node_exporter_version }}.linux-amd64.tar.gz
common_node_exporter_url: >-
  https://github.com/prometheus/node_exporter/releases/download/v{{ node_exporter_version }}/{{ common_node_exporter_archive }}

# SHA256 of the pinned node_exporter version (1.8.2 amd64). Update
# this in the same commit as node_exporter_version in
# group_vars/all/main.yml. The `get_url` task refuses to proceed if
# the checksum does not match.
common_node_exporter_sha256: >-
  6809dd0b3ec45fd6e992c19071d6b5253aed3ead7bf0686885a51d85c6643c44
